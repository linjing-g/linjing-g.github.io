<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="210" viewBox="0 0 720 210" role="img" aria-label="Flowchart: model code flows into the backend selector, which routes to WebGPU, WebGL, WASM, or CPU, producing predictions" font-family="ui-monospace, monospace">
